{% extends "base.html" %}

{% block title %}Заявка отправлена{% endblock %}

{% block content %}
    <section class="section">
        <div class="content-card success-card">
            <div class="success-icon">✓</div>
            <h1>Заявка успешно отправлена</h1>
            <p>
                Спасибо! Мы получили вашу заявку на запись.
                При необходимости с вами свяжутся для уточнения деталей.
            </p>

            <div class="actions" style="justify-content: center; margin-top: 20px;">
                <a href="{% url 'core:home' %}" class="button button-light">На главную</a>
                <a href="{% url 'booking:booking_form' %}" class="button">Новая запись</a>
            </div>
        </div>
    </section>

    <style>
        .success-card {
            max-width: 760px;
            margin: 0 auto;
            text-align: center;
            padding: 40px 28px;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            margin: 0 auto 18px;
            background: #dcfce7;
            color: #15803d;
            font-size: 34px;
            font-weight: 700;
        }

        .success-card p {
            max-width: 560px;
            margin: 0 auto;
            color: #555;
            font-size: 17px;
        }
    </style>
{% endblock %}
