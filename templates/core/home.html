{% extends "base.html" %}
{% load static %}

{% block title %}Главная{% endblock %}
{% block body_class %}home-page{% endblock %}

{% block content %}
    <section class="home-background"></section>
{% endblock %}

{% block extra_style %}
    <style>
        body.home-page {
            background: transparent;
            position: relative;
        }

        body.home-page::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                linear-gradient(90deg, rgba(22, 16, 12, 0.14) 0%, rgba(22, 16, 12, 0.05) 30%, rgba(22, 16, 12, 0.02) 100%),
                url("{% static 'site-backgrounds/home/hero-background.webp' %}");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body.home-page::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.02));
            pointer-events: none;
        }

        body.home-page header,
        body.home-page .page-container,
        body.home-page footer {
            position: relative;
            z-index: 1;
        }

        body.home-page .page-container {
            min-height: calc(100vh - 170px);
            padding-top: 0;
            padding-bottom: 0;
            background: transparent;
        }

        body.home-page .home-background {
            min-height: calc(100vh - 170px);
        }

        body.home-page footer {
            background: transparent;
        }

        body.home-page .footer-shell {
            background: rgba(255, 255, 254, 0.7);
            border-color: rgba(76, 56, 42, 0.16);
            backdrop-filter: blur(10px);
        }

        @media (max-width: 820px) {
            body.home-page .page-container,
            body.home-page .home-background {
                min-height: calc(100vh - 150px);
            }

            body.home-page {
                background: transparent;
            }

            body.home-page::before {
                background-attachment: scroll;
                background-position: 32% center;
            }
        }

        @media (max-width: 560px) {
            body.home-page .page-container,
            body.home-page .home-background {
                min-height: calc(100vh - 132px);
            }

            body.home-page {
                background: transparent;
            }

            body.home-page::before {
                background-position: 28% center;
            }
        }
    </style>
{% endblock %}
